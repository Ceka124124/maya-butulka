<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🍾 Şişe Çevirme</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap');

  :root {
    --bg: #0d0d1a;
    --bg2: #13132a;
    --bg3: #1a1a35;
    --purple: #7c3aed;
    --purple2: #9d5ff5;
    --pink: #ec4899;
    --gold: #f59e0b;
    --cyan: #06b6d4;
    --green: #10b981;
    --red: #ef4444;
    --text: #e8e8ff;
    --text2: #9898cc;
    --card: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --r: 16px;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html, body {
    width:100%; height:100%; overflow:hidden;
    background: var(--bg);
    font-family: 'Nunito', sans-serif;
    color: var(--text);
    user-select:none;
  }

  /* ═══ PARTICLE CANVAS ═══ */
  #particles {
    position:fixed; inset:0; pointer-events:none; z-index:0;
  }

  /* ═══ SCREENS ═══ */
  .screen {
    position:fixed; inset:0; z-index:10;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    transition: opacity .4s, transform .4s;
    overflow-y:auto; overflow-x:hidden;
  }
  .screen.hidden { opacity:0; pointer-events:none; transform:scale(.96); }

  /* ═══ WELCOME ═══ */
  #sWelcome {
    gap:24px; padding:24px;
    background: radial-gradient(ellipse at 50% 0%, rgba(124,58,237,.35) 0%, transparent 70%),
                radial-gradient(ellipse at 80% 100%, rgba(236,72,153,.2) 0%, transparent 60%),
                var(--bg);
  }

  .logo-wrap {
    display:flex; flex-direction:column; align-items:center; gap:8px;
  }
  .logo-bottle {
    font-size:80px; line-height:1;
    animation: floatY 3s ease-in-out infinite;
    filter: drop-shadow(0 0 30px rgba(124,58,237,.8));
  }
  @keyframes floatY {
    0%,100%{transform:translateY(0) rotate(-5deg);}
    50%{transform:translateY(-12px) rotate(5deg);}
  }
  .logo-title {
    font-family:'Fredoka One',sans-serif;
    font-size:36px; letter-spacing:2px;
    background: linear-gradient(135deg, #fff 0%, var(--purple2) 50%, var(--pink) 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    text-shadow: none;
  }
  .logo-sub {
    font-size:13px; color:var(--text2); letter-spacing:3px; text-transform:uppercase;
  }

  .name-input-wrap {
    width:100%; max-width:340px;
    display:flex; flex-direction:column; gap:10px;
  }
  .name-input-wrap label {
    font-size:12px; font-weight:700; color:var(--text2);
    text-transform:uppercase; letter-spacing:2px;
  }
  .name-input-wrap input {
    width:100%; padding:14px 18px;
    background:var(--bg3); border:2px solid var(--border);
    border-radius:var(--r); color:var(--text);
    font-size:16px; font-family:'Nunito',sans-serif; font-weight:700;
    outline:none; transition:border-color .2s;
  }
  .name-input-wrap input:focus { border-color:var(--purple2); }
  .name-input-wrap input::placeholder { color:var(--text2); }

  /* Bottle chooser */
  .bottle-picker {
    width:100%; max-width:340px;
    display:flex; flex-direction:column; gap:10px;
  }
  .bottle-picker label {
    font-size:12px; font-weight:700; color:var(--text2);
    text-transform:uppercase; letter-spacing:2px;
  }
  .bottle-grid {
    display:grid; grid-template-columns:repeat(6,1fr); gap:8px;
  }
  .bottle-opt {
    aspect-ratio:1; border-radius:12px;
    background:var(--bg3); border:2px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    font-size:22px; cursor:pointer; transition:all .2s;
  }
  .bottle-opt:hover { border-color:var(--purple2); transform:scale(1.1); }
  .bottle-opt.selected {
    border-color:var(--gold); background:rgba(245,158,11,.15);
    box-shadow:0 0 16px rgba(245,158,11,.4);
    transform:scale(1.1);
  }

  /* Buttons */
  .btn {
    padding:14px 28px; border:none; border-radius:var(--r);
    font-family:'Nunito',sans-serif; font-weight:800; font-size:16px;
    cursor:pointer; transition:all .2s; position:relative; overflow:hidden;
    letter-spacing:.5px;
  }
  .btn::after {
    content:''; position:absolute; inset:0;
    background:rgba(255,255,255,0); transition:background .2s;
  }
  .btn:active::after { background:rgba(255,255,255,.1); }
  .btn:active { transform:scale(.97); }

  .btn-primary {
    background:linear-gradient(135deg, var(--purple), var(--purple2));
    color:#fff; width:100%; max-width:340px;
    box-shadow:0 8px 32px rgba(124,58,237,.4);
  }
  .btn-primary:hover { box-shadow:0 12px 40px rgba(124,58,237,.6); transform:translateY(-2px); }

  .btn-secondary {
    background:var(--bg3); border:2px solid var(--border);
    color:var(--text); width:100%; max-width:340px;
  }
  .btn-secondary:hover { border-color:var(--purple2); }

  .btn-danger {
    background:linear-gradient(135deg, #dc2626, var(--red));
    color:#fff;
    box-shadow:0 4px 16px rgba(239,68,68,.3);
  }
  .btn-success {
    background:linear-gradient(135deg, #059669, var(--green));
    color:#fff;
    box-shadow:0 4px 16px rgba(16,185,129,.3);
  }
  .btn-gold {
    background:linear-gradient(135deg, #d97706, var(--gold));
    color:#000; width:100%;
    box-shadow:0 8px 32px rgba(245,158,11,.5);
    font-size:18px; padding:18px;
  }
  .btn-gold:hover { box-shadow:0 12px 40px rgba(245,158,11,.7); transform:translateY(-2px); }

  /* ═══ MAIN GAME ═══ */
  #sGame {
    flex-direction:column; gap:0; padding:0;
    background: var(--bg);
    justify-content:flex-start;
  }

  /* top bar */
  .topbar {
    width:100%; padding:12px 16px;
    display:flex; align-items:center; justify-content:space-between;
    background:rgba(0,0,0,.4); backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border); flex-shrink:0;
    z-index:5;
  }
  .topbar-left { display:flex; align-items:center; gap:10px; }
  .room-code {
    font-family:'Fredoka One',sans-serif; font-size:20px;
    color:var(--gold); letter-spacing:2px;
  }
  .online-badge {
    background:rgba(16,185,129,.15); border:1px solid rgba(16,185,129,.3);
    color:var(--green); font-size:11px; font-weight:700;
    padding:3px 8px; border-radius:20px; letter-spacing:1px;
  }
  .topbar-right { display:flex; align-items:center; gap:8px; }
  .icon-btn {
    width:36px; height:36px; border-radius:10px;
    background:var(--bg3); border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size:18px; transition:all .2s;
  }
  .icon-btn:hover { border-color:var(--purple2); transform:scale(1.1); }

  /* arena */
  .arena {
    flex:1; position:relative; display:flex;
    align-items:center; justify-content:center;
    min-height:0; overflow:hidden;
  }

  /* turn indicator */
  .turn-banner {
    position:absolute; top:12px; left:50%; transform:translateX(-50%);
    z-index:10; white-space:nowrap;
    background:rgba(0,0,0,.7); backdrop-filter:blur(8px);
    border:1px solid var(--border); border-radius:24px;
    padding:6px 16px; font-size:12px; font-weight:700;
    color:var(--text2); letter-spacing:1px;
    transition:all .3s;
  }
  .turn-banner.my-turn {
    background:rgba(124,58,237,.3); border-color:var(--purple2);
    color:var(--purple2);
    animation:pulseBorder 1.5s ease infinite;
  }
  @keyframes pulseBorder {
    0%,100%{box-shadow:0 0 0 0 rgba(124,58,237,.4);}
    50%{box-shadow:0 0 0 8px rgba(124,58,237,0);}
  }

  /* circle table */
  #circleTable {
    position:relative;
    width:min(76vw, 320px); height:min(76vw, 320px);
    flex-shrink:0;
  }

  .table-bg {
    position:absolute; inset:0; border-radius:50%;
    background:radial-gradient(circle at 40% 35%,
      rgba(124,58,237,.12) 0%,
      rgba(13,13,26,.8) 60%,
      rgba(124,58,237,.06) 100%);
    border:2px solid rgba(124,58,237,.2);
    box-shadow:
      0 0 60px rgba(124,58,237,.15) inset,
      0 0 0 1px rgba(255,255,255,.04);
  }
  .table-rings {
    position:absolute; inset:15px; border-radius:50%;
    border:1px dashed rgba(255,255,255,.05);
  }
  .table-rings2 {
    position:absolute; inset:35px; border-radius:50%;
    border:1px dashed rgba(255,255,255,.04);
  }

  /* bottle in center */
  #bottleWrap {
    position:absolute; left:50%; top:50%;
    transform:translate(-50%,-50%);
    z-index:5; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:4px;
  }
  #bottleEmoji {
    font-size:52px; line-height:1;
    filter:drop-shadow(0 4px 12px rgba(124,58,237,.6));
    transition:transform .1s;
    transform-origin:center center;
  }
  #bottleWrap:hover #bottleEmoji { transform:scale(1.1); }
  #bottleWrap.spinning #bottleEmoji { cursor:default; }
  .spin-hint {
    font-size:10px; color:var(--text2); letter-spacing:1px;
    font-weight:700; text-transform:uppercase;
    transition:opacity .3s;
  }

  /* player avatars on circle */
  .player-seat {
    position:absolute; left:50%; top:50%;
    transform-origin:0 0;
    z-index:6;
    pointer-events:none;
  }
  .player-avatar {
    width:48px; height:48px;
    border-radius:50%;
    border:3px solid var(--border);
    background:var(--bg3);
    display:flex; align-items:center; justify-content:center;
    font-size:20px; font-weight:800;
    transition:all .3s;
    position:relative;
    overflow:hidden;
    box-shadow:0 4px 16px rgba(0,0,0,.5);
    transform:translate(-50%,-50%);
    cursor:pointer; pointer-events:all;
  }
  .player-avatar img {
    width:100%; height:100%; object-fit:cover;
  }
  .player-avatar .pname {
    position:absolute; bottom:-22px; left:50%; transform:translateX(-50%);
    white-space:nowrap; font-size:10px; font-weight:800;
    background:rgba(0,0,0,.8); padding:2px 6px; border-radius:6px;
    max-width:60px; overflow:hidden; text-overflow:ellipsis;
  }
  .player-avatar.is-turn {
    border-color:var(--gold) !important;
    box-shadow:0 0 0 3px rgba(245,158,11,.4), 0 4px 20px rgba(0,0,0,.6) !important;
  }
  .player-avatar.is-target {
    border-color:var(--pink) !important;
    box-shadow:0 0 0 4px rgba(236,72,153,.5), 0 0 20px rgba(236,72,153,.4) !important;
    animation:targetPulse .6s ease infinite alternate !important;
  }
  @keyframes targetPulse {
    from{box-shadow:0 0 0 3px rgba(236,72,153,.4),0 0 16px rgba(236,72,153,.3);}
    to{box-shadow:0 0 0 6px rgba(236,72,153,.2),0 0 32px rgba(236,72,153,.6);}
  }

  /* level badge on avatar */
  .level-badge {
    position:absolute; top:-4px; right:-4px;
    background:var(--gold); color:#000;
    font-size:8px; font-weight:900;
    width:16px; height:16px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    border:1px solid #000;
  }

  /* spinning arrow overlay */
  #spinArrow {
    position:absolute; left:50%; top:50%; z-index:7;
    width:4px; transform-origin:bottom center;
    transform:translate(-50%,-100%);
    pointer-events:none; opacity:0;
    transition:opacity .2s;
  }
  #spinArrow.visible { opacity:1; }
  .arrow-body {
    width:4px; height:90px;
    background:linear-gradient(to top, rgba(236,72,153,.1), var(--pink));
    border-radius:4px 4px 0 0;
    margin:0 auto;
    box-shadow:0 0 10px rgba(236,72,153,.6);
  }
  .arrow-head {
    width:0; height:0;
    border-left:8px solid transparent;
    border-right:8px solid transparent;
    border-bottom:14px solid var(--pink);
    margin:0 auto;
    filter:drop-shadow(0 0 6px rgba(236,72,153,.8));
  }

  /* bottom panel */
  .bottom-panel {
    flex-shrink:0; width:100%;
    background:rgba(0,0,0,.5); backdrop-filter:blur(16px);
    border-top:1px solid var(--border);
    padding:10px 12px; display:flex; flex-direction:column; gap:8px;
  }

  /* chat */
  .chat-area {
    height:80px; overflow-y:auto; overflow-x:hidden;
    display:flex; flex-direction:column; gap:3px;
    padding-right:4px;
  }
  .chat-area::-webkit-scrollbar { width:3px; }
  .chat-area::-webkit-scrollbar-track { background:transparent; }
  .chat-area::-webkit-scrollbar-thumb { background:rgba(255,255,255,.1); border-radius:2px; }

  .msg {
    font-size:12px; line-height:1.4;
    padding:3px 8px; border-radius:8px;
    animation:msgIn .2s ease;
  }
  @keyframes msgIn { from{opacity:0;transform:translateY(4px);} to{opacity:1;transform:none;} }
  .msg.system {
    color:var(--text2);
    background:rgba(255,255,255,.03);
    font-style:italic;
  }
  .msg.chat .msg-name { font-weight:800; margin-right:4px; }
  .msg.chat .msg-body { color:var(--text); }

  .chat-input-row {
    display:flex; gap:8px;
  }
  .chat-input-row input {
    flex:1; padding:8px 12px;
    background:var(--bg3); border:1px solid var(--border);
    border-radius:10px; color:var(--text);
    font-size:13px; font-family:'Nunito',sans-serif; font-weight:600;
    outline:none; transition:border-color .2s;
  }
  .chat-input-row input:focus { border-color:var(--purple2); }
  .chat-input-row input::placeholder { color:var(--text2); }
  .send-btn {
    padding:8px 14px; border-radius:10px;
    background:var(--purple); border:none; color:#fff;
    font-size:16px; cursor:pointer; transition:all .2s;
  }
  .send-btn:hover { background:var(--purple2); }

  /* reactions bar */
  .reactions-bar {
    display:flex; gap:6px; justify-content:center;
  }
  .react-btn {
    background:var(--bg3); border:1px solid var(--border);
    border-radius:10px; padding:6px 10px; font-size:18px;
    cursor:pointer; transition:all .2s;
  }
  .react-btn:hover { transform:scale(1.2); border-color:var(--purple2); }
  .react-btn:active { transform:scale(.9); }

  /* ═══ OVERLAY MODALS ═══ */
  .overlay {
    position:fixed; inset:0; z-index:100;
    background:rgba(0,0,0,.7); backdrop-filter:blur(8px);
    display:flex; align-items:center; justify-content:center;
    padding:20px; transition:opacity .3s;
  }
  .overlay.hidden { opacity:0; pointer-events:none; }

  .modal {
    background:var(--bg2);
    border:1px solid var(--border); border-radius:24px;
    padding:28px; width:100%; max-width:380px;
    display:flex; flex-direction:column; gap:20px;
    position:relative; overflow:hidden;
    box-shadow:0 32px 80px rgba(0,0,0,.8);
  }
  .modal::before {
    content:''; position:absolute; top:0; left:0; right:0; height:3px;
    background:linear-gradient(90deg, var(--purple), var(--pink), var(--gold));
  }

  .modal-title {
    font-family:'Fredoka One',sans-serif;
    font-size:24px; text-align:center;
    background:linear-gradient(135deg, #fff, var(--purple2));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  }

  /* challenge modal */
  #mChallenge .challenge-cat {
    font-size:48px; text-align:center;
    animation:popIn .4s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes popIn {
    from{transform:scale(0) rotate(-10deg);opacity:0;}
    to{transform:none;opacity:1;}
  }
  #mChallenge .challenge-text {
    font-family:'Fredoka One',sans-serif; font-size:28px;
    text-align:center; color:#fff; line-height:1.2;
  }
  #mChallenge .challenge-desc {
    font-size:14px; text-align:center; color:var(--text2); line-height:1.6;
    background:var(--bg3); border-radius:12px; padding:14px;
  }
  #mChallenge .challenge-target {
    display:flex; flex-direction:column; align-items:center; gap:6px;
  }
  #mChallenge .target-label {
    font-size:11px; text-transform:uppercase; letter-spacing:2px; color:var(--text2);
  }
  #mChallenge .target-name {
    font-family:'Fredoka One',sans-serif; font-size:26px;
    color:var(--pink);
  }
  #mChallenge .xp-badge {
    display:inline-flex; align-items:center; gap:4px;
    background:rgba(245,158,11,.15); border:1px solid rgba(245,158,11,.3);
    color:var(--gold); padding:4px 12px; border-radius:20px;
    font-size:13px; font-weight:800;
  }
  .challenge-btns { display:flex; gap:10px; }
  .challenge-btns .btn { flex:1; padding:12px; font-size:14px; }

  /* result modal */
  #mResult .result-icon {
    font-size:72px; text-align:center;
    animation:popIn .5s cubic-bezier(.34,1.56,.64,1);
  }
  #mResult .result-text {
    font-family:'Fredoka One',sans-serif; font-size:26px;
    text-align:center;
  }
  #mResult .result-xp {
    text-align:center; font-size:18px; color:var(--gold); font-weight:800;
  }

  /* leaderboard */
  #mLeaderboard .lb-list {
    display:flex; flex-direction:column; gap:8px;
    max-height:360px; overflow-y:auto;
  }
  .lb-item {
    display:flex; align-items:center; gap:12px;
    background:var(--bg3); border-radius:12px; padding:10px 14px;
  }
  .lb-rank { font-family:'Fredoka One',sans-serif; font-size:20px; width:28px; }
  .lb-info { flex:1; }
  .lb-name { font-weight:800; font-size:14px; }
  .lb-sub { font-size:11px; color:var(--text2); }
  .lb-xp { font-family:'Fredoka One',sans-serif; font-size:16px; color:var(--gold); }

  /* ═══ FLOATING REACTIONS ═══ */
  .floating-reaction {
    position:fixed; pointer-events:none; z-index:200;
    font-size:32px;
    animation:floatUp 1.5s ease forwards;
  }
  @keyframes floatUp {
    0%{opacity:1;transform:translateY(0) scale(1);}
    100%{opacity:0;transform:translateY(-100px) scale(1.5);}
  }

  /* ═══ SPIN OVERLAY ═══ */
  #spinOverlay {
    position:fixed; inset:0; z-index:50; pointer-events:none;
    display:flex; align-items:center; justify-content:center;
    opacity:0; transition:opacity .3s;
  }
  #spinOverlay.show { opacity:1; }
  .spin-ripple {
    position:absolute; inset:0;
    background:radial-gradient(circle, rgba(124,58,237,.15) 0%, transparent 70%);
    animation:rippleGrow 2s ease infinite;
  }
  @keyframes rippleGrow {
    0%{transform:scale(.8);opacity:1;}
    100%{transform:scale(1.5);opacity:0;}
  }

  /* ═══ NOTIFICATION TOAST ═══ */
  #toast {
    position:fixed; top:70px; left:50%; transform:translateX(-50%);
    z-index:300;
    background:var(--bg2); border:1px solid var(--border);
    border-radius:12px; padding:10px 20px;
    font-size:13px; font-weight:700;
    transition:all .3s; opacity:0; pointer-events:none;
    white-space:nowrap; max-width:90vw;
  }
  #toast.show { opacity:1; }

  /* ═══ XP POP ═══ */
  .xp-pop {
    position:fixed; z-index:300; pointer-events:none;
    font-family:'Fredoka One',sans-serif; font-size:22px;
    color:var(--gold);
    text-shadow:0 2px 8px rgba(0,0,0,.8);
    animation:xpFloat 1.2s ease forwards;
  }
  @keyframes xpFloat {
    0%{opacity:1;transform:translateY(0);}
    100%{opacity:0;transform:translateY(-60px);}
  }

  /* ═══ CONFETTI ═══ */
  .confetti-piece {
    position:fixed; z-index:250; pointer-events:none;
    width:10px; height:10px; border-radius:2px;
    animation:confettiFall var(--dur) ease forwards;
  }
  @keyframes confettiFall {
    0%{transform:translateY(0) rotate(0deg);opacity:1;}
    100%{transform:translateY(100vh) rotate(720deg);opacity:0;}
  }

  /* ═══ SCROLLBAR ═══ */
  ::-webkit-scrollbar { width:4px; height:4px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:rgba(255,255,255,.1); border-radius:2px; }

  /* My player highlight */
  .me-dot {
    position:absolute; bottom:0; right:0;
    width:12px; height:12px; border-radius:50%;
    background:var(--green); border:2px solid var(--bg);
  }
</style>
</head>
<body>

<canvas id="particles"></canvas>

<!-- WELCOME SCREEN -->
<div id="sWelcome" class="screen">
  <div class="logo-wrap">
    <div class="logo-bottle">🍾</div>
    <div class="logo-title">ŞİŞE ÇEVİRME</div>
    <div class="logo-sub">Görev Çarkı Oyunu</div>
  </div>

  <div class="name-input-wrap">
    <label>İsmin</label>
    <input id="nameInput" type="text" placeholder="Adını gir..." maxlength="20" autocomplete="off">
  </div>

  <div class="bottle-picker">
    <label>Şişeni Seç</label>
    <div class="bottle-grid" id="bottleGrid"></div>
  </div>

<script src="/socket.io/socket.io.js"></script>
<script>
/* ══════════════════════════════════════════════════════
   PARTICLES
══════════════════════════════════════════════════════ */
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

for (let i = 0; i < 50; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: (Math.random() - .5) * .3,
    vy: (Math.random() - .5) * .3,
    r: Math.random() * 2 + .5,
    a: Math.random(),
    color: ['#7c3aed','#ec4899','#f59e0b','#06b6d4'][Math.floor(Math.random()*4)],
  });
}

function animParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0) p.x = canvas.width;
    if (p.x > canvas.width) p.x = 0;
    if (p.y < 0) p.y = canvas.height;
    if (p.y > canvas.height) p.y = 0;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fillStyle = p.color + Math.floor(p.a * 99).toString(16).padStart(2,'0');
    ctx.fill();
  });
  requestAnimationFrame(animParticles);
}
animParticles();

/* ══════════════════════════════════════════════════════
   AUDIO ENGINE (Web Audio API)
══════════════════════════════════════════════════════ */
let audioCtx = null;
let soundEnabled = true;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, type='sine', dur=.15, vol=.3, delay=0) {
  if (!soundEnabled) return;
  try {
    const ac = getAudioCtx();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = type; osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, ac.currentTime + delay);
    gain.gain.linearRampToValueAtTime(vol, ac.currentTime + delay + .01);
    gain.gain.exponentialRampToValueAtTime(.001, ac.currentTime + delay + dur);
    osc.start(ac.currentTime + delay);
    osc.stop(ac.currentTime + delay + dur + .01);
  } catch(e){}
}

function playSpinSound() {
  // rising whirr
  if (!soundEnabled) return;
  try {
    const ac = getAudioCtx();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(80, ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(600, ac.currentTime + 2.5);
    gain.gain.setValueAtTime(.2, ac.currentTime);
    gain.gain.linearRampToValueAtTime(.05, ac.currentTime + 2.5);
    osc.start(ac.currentTime);
    osc.stop(ac.currentTime + 2.6);
  } catch(e){}
}

function playWinSound() {
  [523,659,784,1047].forEach((f,i) => playTone(f,'sine',.2,.25,i*.12));
}

function playFailSound() {
  [400,300,200].forEach((f,i) => playTone(f,'sawtooth',.15,.2,i*.1));
}

function playJoinSound() {
  playTone(440,'sine',.1,.2);
  playTone(550,'sine',.1,.15,.08);
}

function playClickSound() {
  playTone(800,'square',.05,.1);
}

function playNotifSound() {
  playTone(600,'sine',.08,.2);
  playTone(800,'sine',.08,.15,.06);
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  document.getElementById('soundBtn').textContent = soundEnabled ? '🔊' : '🔇';
  showToast(soundEnabled ? '🔊 Ses Açık' : '🔇 Ses Kapalı');
  playClickSound();
}

/* ══════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════ */
const BOTTLES_DATA = [
  { id:1, emoji:'🍋', name:'Limonad' },
  { id:2, emoji:'🥤', name:'Kola'    },
  { id:3, emoji:'⚡', name:'Enerji'  },
  { id:4, emoji:'🥃', name:'Viski'   },
  { id:5, emoji:'🍷', name:'Şarap'   },
  { id:6, emoji:'💎', name:'VIP'     },
];

const SLOT_ANGLES = {
  1:330,2:0,3:30,4:60,5:90,6:120,7:150,8:180,9:210,10:240,11:270,12:300
};

let socket = null;
let myId   = null;
let myName = '';
let myBottleId = 1;
let mySlot = null;
let roomId = null;
let roomCode = '';
let gameState = { room:{}, players:[] };
let currentSpinAngle = 0;
let isSpinning = false;
let pendingChallenge = null;

/* ══════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════ */
function initBottlePicker() {
  const grid = document.getElementById('bottleGrid');
  grid.innerHTML = '';
  BOTTLES_DATA.forEach(b => {
    const el = document.createElement('div');
    el.className = 'bottle-opt' + (b.id === myBottleId ? ' selected' : '');
    el.innerHTML = b.emoji;
    el.title = b.name;
    el.onclick = () => {
      myBottleId = b.id;
      document.querySelectorAll('.bottle-opt').forEach(x => x.classList.remove('selected'));
      el.classList.add('selected');
      playClickSound();
      document.getElementById('bottleEmoji').textContent = b.emoji;
      if (socket && myId) socket.emit('set_bottle',{tg_id:myId, bottle_id:b.id});
    };
    grid.appendChild(el);
  });
}
initBottlePicker();

/* ══════════════════════════════════════════════════════
   CONNECT & GAME
══════════════════════════════════════════════════════ */
function startGame() {
  playClickSound();
  myName = document.getElementById('nameInput').value.trim() || 'Oyuncu';

  // Generate a simple ID
  myId = 'web_' + Date.now() + '_' + Math.floor(Math.random()*9999);

  socket = io({ transports:['websocket','polling'] });

  socket.on('connect', () => {
    socket.emit('login', {
      tg_id: myId,
      first_name: myName,
    }, (res) => {
      socket.emit('join_room', { tg_id: myId }, (jr) => {
        if (jr.ok) {
          roomId = jr.room_id;
          mySlot = jr.slot;
          roomCode = jr.code || '----';
          document.getElementById('roomCode').textContent = jr.code || '----';
          socket.emit('set_bottle',{tg_id:myId, bottle_id:myBottleId});
          showScreen('sGame');
          updateBottleVisual();
          playJoinSound();
        }
      });
    });
  });

  socket.on('state', (data) => {
    gameState = data;
    renderArena();
  });

  socket.on('new_msg', (msg) => {
    appendMsg(msg);
  });

  socket.on('history', (msgs) => {
    document.getElementById('chatArea').innerHTML = '';
    msgs.forEach(appendMsg);
  });

  socket.on('spin', (data) => {
    // ALL clients receive same spin
    startBottleSpin(data);
  });

  socket.on('challenge_result', (data) => {
    showResult(data);
  });

  socket.on('reaction', (data) => {
    spawnFloatingReaction(data.emoji);
  });

  socket.on('disconnect', () => {
    showToast('❌ Bağlantı kesildi, yeniden bağlanıyor...');
  });
}

function leaveGame() {
  playClickSound();
  if (socket && roomId) {
    socket.emit('leave_room',{tg_id:myId, room_id:roomId});
    socket.disconnect();
  }
  showScreen('sWelcome');
  document.getElementById('chatArea').innerHTML = '';
  document.getElementById('playerSeats').innerHTML = '';
}

/* ══════════════════════════════════════════════════════
   ARENA RENDER
══════════════════════════════════════════════════════ */
function renderArena() {
  const { room, players } = gameState;
  if (!room || !players) return;

  // Online count
  document.getElementById('onlineBadge').textContent = '● ' + players.length;
  document.getElementById('roomCode').textContent = room.code || roomCode;

  // Turn banner
  const banner = document.getElementById('turnBanner');
  const myP    = players.find(p => p.tg_id === myId);
  if (!myP) {
    mySlot = null;
  } else {
    mySlot = myP.slot;
  }

  if (room.spin_in_progress) {
    const spinner = players.find(p => p.tg_id === room.spin_by);
    const target  = players.find(p => p.slot  === room.spin_target_slot);
    banner.textContent = (spinner?.first_name || '?') + ' → ' + (target?.first_name || '?');
    banner.className = 'turn-banner';
  } else if (players.length < 2) {
    banner.textContent = 'Arkadaş bekle... (en az 2 kişi)';
    banner.className = 'turn-banner';
  } else if (mySlot && room.current_turn_slot === mySlot) {
    banner.textContent = '⭐ Sıra sende! Şişeyi çevir!';
    banner.className = 'turn-banner my-turn';
  } else {
    const curP = players.find(p => p.slot === room.current_turn_slot);
    banner.textContent = (curP?.first_name || '?') + ' çeviriyor...';
    banner.className = 'turn-banner';
  }

  // Spin button hint
  const spinHint = document.getElementById('spinHint');
  const isMyTurn = mySlot && room.current_turn_slot === mySlot && !room.spin_in_progress;
  spinHint.style.opacity = isMyTurn ? '1' : '0';
  document.getElementById('bottleWrap').style.cursor = isMyTurn ? 'pointer' : 'default';

  // Render seats
  const seats = document.getElementById('playerSeats');
  seats.innerHTML = '';
  const tableSize = document.getElementById('circleTable').offsetWidth;
  const radius = tableSize * 0.44;
  const cx = tableSize / 2, cy = tableSize / 2;

  players.forEach(p => {
    const angle = (SLOT_ANGLES[p.slot] ?? 0) * Math.PI / 180;
    const x = cx + radius * Math.cos(angle);
    const y = cy + radius * Math.sin(angle);

    const seat = document.createElement('div');
    seat.className = 'player-seat';
    seat.style.left = x + 'px';
    seat.style.top  = y + 'px';

    const bottle = BOTTLES_DATA.find(b => b.id === (p.bottle_id || 1));
    const isMe     = p.tg_id === myId;
    const isTurn   = p.slot  === room.current_turn_slot && !room.spin_in_progress;
    const isTarget = p.slot  === room.spin_target_slot  && room.spin_in_progress;

    let cls = 'player-avatar';
    if (isTurn)   cls += ' is-turn';
    if (isTarget) cls += ' is-target';

    const initials = (p.first_name || '?').substring(0,2).toUpperCase();

    seat.innerHTML = `
      <div class="${cls}" style="border-color:${p.name_color}40;">
        ${p.photo_url ? `<img src="${p.photo_url}" onerror="this.style.display='none'">` : ''}
        <span style="color:${p.name_color}">${initials}</span>
        <div class="level-badge">${p.level || 1}</div>
        ${isMe ? '<div class="me-dot"></div>' : ''}
        <div class="pname" style="color:${p.name_color}">${p.first_name || '?'}</div>
      </div>
    `;
    seats.appendChild(seat);
  });
}

/* ══════════════════════════════════════════════════════
   BOTTLE VISUAL
══════════════════════════════════════════════════════ */
function updateBottleVisual() {
  const b = BOTTLES_DATA.find(x => x.id === myBottleId) || BOTTLES_DATA[0];
  document.getElementById('bottleEmoji').textContent = b.emoji;
}

/* ══════════════════════════════════════════════════════
   SPIN
══════════════════════════════════════════════════════ */
function doSpin() {
  const { room, players } = gameState;
  if (!room || !mySlot) return;
  if (room.spin_in_progress) { showToast('⏳ Şişe zaten dönüyor!'); return; }
  if (room.current_turn_slot !== mySlot) { showToast('⏳ Sıran değil!'); return; }
  if (!players || players.length < 2) { showToast('🙋 En az 2 kişi gerekli!'); return; }

  playClickSound();
  socket.emit('spin', { tg_id: myId, room_id: roomId });
}

function startBottleSpin(data) {
  if (isSpinning) return;
  isSpinning = true;

  playSpinSound();

  const overlay = document.getElementById('spinOverlay');
  overlay.classList.add('show');

  const bottleEl = document.getElementById('bottleWrap');
  const arrowEl  = document.getElementById('spinArrow');
  const bottleEmoji = document.getElementById('bottleEmoji');
  bottleEl.classList.add('spinning');
  arrowEl.classList.add('visible');

  const totalAngle = data.angle; // e.g. 1440–3600 degrees
  const duration   = 2800; // ms
  const start      = performance.now();

  // Also highlight target immediately
  renderArena();

  function animate(now) {
    const elapsed = now - start;
    const progress = Math.min(elapsed / duration, 1);
    // Ease out cubic
    const eased = 1 - Math.pow(1 - progress, 3);
    const currentAngle = totalAngle * eased;

    // Rotate arrow
    arrowEl.style.transform = `translate(-50%, -100%) rotate(${currentAngle}deg)`;
    // Rotate bottle emoji slightly
    bottleEmoji.style.transform = `rotate(${currentAngle * .3}deg) scale(${1 + Math.sin(progress * Math.PI) * .15})`;

    // Tick sound every ~30°
    if (Math.floor(currentAngle / 30) > Math.floor((currentAngle - (totalAngle * (1/(duration*60)))) / 30)) {
      const speed = 1 - eased;
      if (speed > .1) playTone(200 + speed * 400, 'square', .03, .05 * speed);
    }

    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      // Done spinning
      bottleEl.classList.remove('spinning');
      bottleEmoji.style.transform = '';
      overlay.classList.remove('show');
      isSpinning = false;

      // Show the challenge
      if (data.challenge) {
        showChallenge(data);
      }
    }
  }

  requestAnimationFrame(animate);
}

/* ══════════════════════════════════════════════════════
   CHALLENGE
══════════════════════════════════════════════════════ */
function showChallenge(data) {
  pendingChallenge = data;
  const ch = data.challenge;

  document.getElementById('challengeTargetName').textContent = data.target_name || '?';
  document.getElementById('challengeCat').textContent  = ch.cat;
  document.getElementById('challengeText').textContent = ch.text;
  document.getElementById('challengeDesc').textContent = ch.desc;
  document.getElementById('challengeXP').textContent   = ch.xp;

  // Only spinner can resolve
  const btns = document.getElementById('challengeBtns');
  if (data.spin_by === myId) {
    btns.style.display = 'flex';
  } else {
    btns.style.display = 'none';
  }

  // Trigger confetti
  spawnConfetti(data.done !== false);
  playNotifSound();

  document.getElementById('mChallengeOverlay').classList.remove('hidden');
}

function resolveChallenge(done) {
  playClickSound();
  socket.emit('challenge_done', {
    tg_id: myId, room_id: roomId, done
  });
  document.getElementById('mChallengeOverlay').classList.add('hidden');
  pendingChallenge = null;
}

/* ══════════════════════════════════════════════════════
   RESULT
══════════════════════════════════════════════════════ */
function showResult(data) {
  document.getElementById('mChallengeOverlay').classList.add('hidden');

  const icon = data.done ? '🏆' : '💨';
  const text = data.done
    ? (data.target_name || '?') + ' görevi tamamladı!'
    : (data.target_name || '?') + ' görevi geçti!';

  document.getElementById('resultIcon').textContent = icon;
  document.getElementById('resultText').textContent = text;
  document.getElementById('resultXP').textContent = data.done ? '+' + data.xp_gained + ' XP 🌟' : '';

  if (data.done) { playWinSound(); spawnConfetti(true); }
  else { playFailSound(); }

  // If I'm the target and done
  if (data.target_id === myId && data.done) {
    spawnXPPop(data.xp_gained || 20);
  }

  document.getElementById('mResultOverlay').classList.remove('hidden');
}

function closeResult() {
  playClickSound();
  document.getElementById('mResultOverlay').classList.add('hidden');
}

/* ══════════════════════════════════════════════════════
   LEADERBOARD
══════════════════════════════════════════════════════ */
function showLeaderboard() {
  playClickSound();
  const doShow = (data) => {
    const list = document.getElementById('lbList');
    list.innerHTML = '';
    const ranks = ['🥇','🥈','🥉'];
    (data.leaders || []).forEach((u, i) => {
      const item = document.createElement('div');
      item.className = 'lb-item';
      item.innerHTML = `
        <div class="lb-rank">${ranks[i] || (i+1)}</div>
        <div class="lb-info">
          <div class="lb-name" style="color:${u.name_color||'#fff'}">${u.first_name || '?'}</div>
          <div class="lb-sub">Lv.${u.level} · ${u.wins} Görev · ${u.spins} Spin</div>
        </div>
        <div class="lb-xp">${u.xp} XP</div>
      `;
      list.appendChild(item);
    });
    document.getElementById('mLeaderboardOverlay').classList.remove('hidden');
  };

  if (socket && socket.connected) {
    socket.emit('leaderboard', {}, doShow);
  } else {
    fetch('/api/leaderboard').then(r=>r.json()).then(doShow);
  }
}

function closeLeaderboard() {
  playClickSound();
  document.getElementById('mLeaderboardOverlay').classList.add('hidden');
}

/* ══════════════════════════════════════════════════════
   CHAT
══════════════════════════════════════════════════════ */
function sendChat() {
  const input = document.getElementById('chatInput');
  const txt = input.value.trim();
  if (!txt || !socket) return;
  playClickSound();
  socket.emit('msg',{ tg_id:myId, room_id:roomId, text:txt });
  input.value = '';
}

function appendMsg(msg) {
  const area = document.getElementById('chatArea');
  const el = document.createElement('div');
  if (msg.msg_type === 'system') {
    el.className = 'msg system';
    el.textContent = msg.body;
  } else {
    el.className = 'msg chat';
    el.innerHTML = `<span class="msg-name" style="color:${msg.name_color||'#fff'}">${msg.username||'?'}</span><span class="msg-body">${msg.body}</span>`;
  }
  area.appendChild(el);
  area.scrollTop = area.scrollHeight;

  // Keep max 60 msgs
  while (area.children.length > 60) area.removeChild(area.firstChild);
}

/* ══════════════════════════════════════════════════════
   REACTIONS
══════════════════════════════════════════════════════ */
function sendReaction(emoji) {
  playClickSound();
  if (socket) socket.emit('reaction',{ tg_id:myId, room_id:roomId, emoji });
  spawnFloatingReaction(emoji);
}

function spawnFloatingReaction(emoji) {
  const el = document.createElement('div');
  el.className = 'floating-reaction';
  el.textContent = emoji;
  el.style.left = (20 + Math.random() * 60) + 'vw';
  el.style.bottom = '20%';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1600);
}

/* ══════════════════════════════════════════════════════
   CONFETTI
══════════════════════════════════════════════════════ */
function spawnConfetti(win) {
  const colors = win
    ? ['#f59e0b','#10b981','#7c3aed','#ec4899','#06b6d4','#fff']
    : ['#ef4444','#6b7280'];
  for (let i = 0; i < 40; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = (Math.random() * 100) + 'vw';
    el.style.top  = '-10px';
    el.style.background = colors[Math.floor(Math.random()*colors.length)];
    el.style.setProperty('--dur', (.8 + Math.random() * 1.4) + 's');
    el.style.animationDelay = (Math.random() * .5) + 's';
    el.style.borderRadius = Math.random() > .5 ? '50%' : '2px';
    el.style.width  = (6 + Math.random() * 8) + 'px';
    el.style.height = (6 + Math.random() * 8) + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2400);
  }
}

/* ══════════════════════════════════════════════════════
   XP POP
══════════════════════════════════════════════════════ */
function spawnXPPop(xp) {
  const el = document.createElement('div');
  el.className = 'xp-pop';
  el.textContent = '+' + xp + ' XP ⭐';
  el.style.left = '50vw';
  el.style.top  = '40vh';
  el.style.transform = 'translateX(-50%)';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1300);
}

/* ══════════════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════════════ */
let _toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

/* ══════════════════════════════════════════════════════
   SCREEN NAV
══════════════════════════════════════════════════════ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.toggle('hidden', s.id !== id);
  });
}
</script>
